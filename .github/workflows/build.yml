name: Build Apache TVM

on:
  push:
    branches: 'main'
  schedule:
    - cron: "0 17 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "21.1.8"
  CUDA_VERSION: "13.0.2"

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      HASH: ${{ steps.tvm.outputs.HASH }}
      SHORT_SHA: ${{ steps.tvm.outputs.SHORT_SHA }}
      DATE_JST:  ${{ steps.date.outputs.DATE_JST }}
      DATE_JST_COMPACT: ${{ steps.date.outputs.DATE_JST_COMPACT }}
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: tvm
        with:
          script: |
            const { data } = await github.rest.git.getRef({
              owner: 'apache',
              repo: 'tvm',
              ref: 'heads/main',
            });
            core.setOutput('HASH', data.object.sha);
            core.setOutput('SHORT_SHA', data.object.sha.substring(0,8));
      - id: date
        run: |
          echo "DATE_JST=$(TZ=Asia/Tokyo date +%F)" >> $GITHUB_OUTPUT
          echo "DATE_JST_COMPACT=$(TZ=Asia/Tokyo date +%Y%m%d)" >> $GITHUB_OUTPUT

  build:
    needs: [meta]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: 'apache/tvm'
          ref: ${{ needs.meta.outputs.HASH }}
          submodules: recursive
          github-server-url: https://github.com

      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
        with:
          activate-environment: "true"

      - uses: Jimver/cuda-toolkit@b6fc3a9f3f15256d9d94ffe1254f9c5a2565cde6 # v0.2.30
        if: runner.os == 'Linux'
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          log-file-suffix: '${{matrix.os}}.txt'

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt install -y gcc libtinfo-dev zlib1g-dev \
            build-essential libedit-dev libxml2-dev llvm-18-dev llvm-18-tools clang-18 libpolly-18-dev
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          uv pip install -U pip numpy cmake ninja wheel cython build setuptools pytest

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          uv pip install -U pip numpy cmake ninja wheel cython build setuptools

      - name: Download official LLVM archive
        if: runner.os == 'Windows'
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/clang%2Bllvm-$env:LLVM_VERSION-x86_64-pc-windows-msvc.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile llvm.tar.xz
          7z x llvm.tar.xz -y | Out-Null
          7z x llvm.tar -y -ollvm | Out-Null
          $llvmRoot = (Get-ChildItem llvm | Where-Object { $_.PSIsContainer } | Select-Object -First 1).FullName
          $llvmRootUnix = $llvmRoot -replace '\\','/'
          $llvmDir = (Resolve-Path "$llvmRoot\lib\cmake\llvm").Path -replace '\\','/'
          "LLVM_ROOT=$llvmRootUnix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$llvmRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "LLVM_ROOT=$llvmRootUnix"
          Write-Host "LLVM_DIR=$llvmDir"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          uv pip install -U pip numpy cmake ninja wheel cython build setuptools

      - name: Build zstd (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/facebook/zstd.git
          make -C zstd clean
          make -C zstd ZSTD_LEGACY_SUPPORT=0 CFLAGS="-O2 -fPIC"
          sudo make -C zstd install PREFIX=/usr/local
          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/zz-local.conf
          sudo ldconfig
          rm -rf zstd

      - name: Define CMake args (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          echo "TVM_CMAKE_ARGS=\"-G Ninja; -DCMAKE_BUILD_TYPE=RelWithDebInfo; -DUSE_LLVM='llvm-config-18 --link-static'; -DUSE_MLIR=ON; -DUSE_CUDA=ON; -DUSE_TENSORRT_CODEGEN=ON\"" >> $GITHUB_ENV

      - name: Define CMake args (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "TVM_CMAKE_ARGS=\"-G Ninja; -DCMAKE_BUILD_TYPE=RelWithDebInfo; -DUSE_LLVM='$(brew --prefix llvm)/bin/llvm-config --link-static'; -DUSE_MLIR=ON; -DUSE_METAL=ON\"" >> $GITHUB_ENV

      - name: Define CMake args (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "TVM_CMAKE_ARGS='-G Ninja; -DCMAKE_BUILD_TYPE=RelWithDebInfo; -DUSE_LLVM=ON; -DLLVM_DIR=$env:LLVM_DIR'" >> $env:GITHUB_ENV

      - name: Build python package
        run: |
          uv build --wheel . --config-settings=cmake.args=${{ env.TVM_CMAKE_ARGS }}
          uv build --wheel 3rdparty/tvm-ffi/

      - name: Test TVM
        env:
          TVM_TEST_TARGETS: "llvm"
        run: |
          mkdir tmp
          cp 3rdparty/tvm-ffi/dist/apache_tvm_ffi-*.whl dist/tvm-*.whl tmp
          cd tmp
          uv venv
          uv pip install apache_tvm_ffi-*.whl tvm-*.whl
          uv run python -c "import tvm; print(tvm.__file__); print(tvm.__version__); print(tvm.support.describe()); print(tvm.support.libinfo())"
          uv run pytest -v "../tests/python/all-platform-minimal-test"

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-${{ runner.os }}-py${{ matrix.python-version }}
          path: |
            dist/tvm-*.whl
            3rdparty/tvm-ffi/dist/apache_tvm_ffi-*.whl

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: upload
          merge-multiple: true

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: Apache TVM Weekly (${{ needs.meta.outputs.DATE_JST }}) [tvm ${{ needs.meta.outputs.SHORT_SHA }}]
          tag_name: weekly-${{ needs.meta.outputs.DATE_JST_COMPACT }}-tvm-${{ needs.meta.outputs.SHORT_SHA }}
          body: |
            tvm: ${{ needs.meta.outputs.HASH }}
            CUDA: ${{ env.CUDA_VERSION }} (Linux only)
            Built (JST): ${{ needs.meta.outputs.DATE_JST }}
          files: |
            upload/dist/*.whl
            upload/3rdparty/tvm-ffi/dist/*.whl
          prerelease: true
          fail_on_unmatched_files: true

      - name: Delete weekly tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete weekly --cleanup-tag --yes || true

      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          name: Apache TVM Weekly (latest)
          tag_name: weekly
          body: |
            tvm: ${{ needs.meta.outputs.HASH }}
            CUDA: ${{ env.CUDA_VERSION }} (Linux only)
            Latest build (JST): ${{ needs.meta.outputs.DATE_JST }}
          files: |
            upload/dist/*.whl
            upload/3rdparty/tvm-ffi/dist/*.whl
          prerelease: true
          fail_on_unmatched_files: true
